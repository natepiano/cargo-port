# Default Dark — compiled-in built-in mirrored as TOML.
#
# This file is documentation. The app does NOT load it at startup; the
# Rust constructor `tui_pane::default_dark()` produces the same values.
# Copy this file into `~/.config/cargo-port/themes/` (or platform
# equivalent) as a starting point for a custom theme.
#
# The test in tui_pane/tests/themes.rs locks this file against drift.

schema = 1
name = "Default"

[[variants]]
name = "Default Dark"
appearance = "dark"

[variants.pane_chrome]
active_border   = "Yellow"
inactive_border = "DarkGray"
active_title    = { color = "Yellow", bold = true }
inactive_title  = "White"

[variants.focus]
active     = { r = 125, g = 125, b = 125 }
hover      = { r = 80,  g = 80,  b = 80  }
remembered = { r = 40,  g = 40,  b = 40  }

[variants.semantic]
accent       = "Cyan"
error        = "Red"
inline_error = "Yellow"
success      = "Green"
label        = { r = 150, g = 190, b = 180 }

[variants.text]
default   = "White"
secondary = "Gray"
dim       = "DarkGray"
bright    = "Cyan"
bg_focus  = "Black"

[variants.git]
ignored   = "DarkGray"
modified  = { indexed = 208 }
untracked = "Green"

[variants.status]
bar           = "DarkGray"
target_bench  = "Magenta"
column_header = { color = { r = 150, g = 190, b = 180 }, bold = true }

[variants.finder]
match_bg          = { r = 0,   g = 90,  b = 100 }
discovery_shimmer = { r = 150, g = 210, b = 255 }

[variants.disk_usage]
low  = { r = 100, g = 220, b = 100 }
mid  = { r = 255, g = 255, b = 255 }
high = { r = 255, g = 100, b = 100 }
