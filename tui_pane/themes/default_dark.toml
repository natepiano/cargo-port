# Default Dark — compiled-in built-in mirrored as TOML.
#
# This file is documentation. The app does NOT load it at startup; the
# Rust constructor `tui_pane::default_dark()` produces the same values.
# Copy this file into your app's theme directory as a starting point
# for a custom theme.
#
# The test in tui_pane/tests/themes.rs locks this file against drift.

name   = "Default"
schema = 1

[[variants]]
appearance = "dark"
name       = "Default Dark"

[variants.pane_chrome]
active_border   = "Yellow"
active_title    = { color = "Yellow", bold = true }
inactive_border = "DarkGray"
inactive_title  = "White"

[variants.focus]
active     = { r = 125, g = 125, b = 125 }
hover      = { r = 80, g = 80, b = 80 }
remembered = { r = 40, g = 40, b = 40 }

[variants.semantic]
accent       = "Cyan"
error        = "Red"
inline_error = "Yellow"
label        = { r = 150, g = 190, b = 180 }
success      = "Green"
warning      = "Yellow"

[variants.text]
bg_focus  = "Black"
bright    = "Cyan"
default   = "White"
dim       = "DarkGray"
secondary = "Gray"

[variants.roles]

[variants.status]
bar = "DarkGray"

[variants.finder]
match_bg = { r = 0, g = 90, b = 100 }

[variants.disk_usage]
high = { r = 255, g = 100, b = 100 }
low  = { r = 100, g = 220, b = 100 }
mid  = { r = 255, g = 255, b = 255 }
