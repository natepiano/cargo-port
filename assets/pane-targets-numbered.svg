<svg xmlns="http://www.w3.org/2000/svg" viewBox="1240 505 533 311" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port targets pane with numbered markers</title>
  <desc id="desc">Targets pane with markers for target list, source package, target kind, and paging.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="1480" cy="792" r="17"/><text class="pin-text" x="1480" y="792" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="1538" cy="792" r="17"/><text class="pin-text" x="1538" y="792" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="1596" cy="792" r="17"/><text class="pin-text" x="1596" y="792" dx=".02em" dy=".19em">3</text>
  <circle class="pin" cx="1654" cy="792" r="17"/><text class="pin-text" x="1654" y="792" dx=".02em" dy=".19em">4</text>
</svg>
