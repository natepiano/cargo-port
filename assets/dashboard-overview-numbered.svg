<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1196" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port dashboard overview with numbered panes</title>
  <desc id="desc">Full cargo-port dashboard screenshot with numbered markers for each major pane.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <g>
    <circle class="pin" cx="310" cy="675" r="18"/><text class="pin-text" x="310" y="675" dx=".02em" dy=".19em">1</text>
    <circle class="pin" cx="860" cy="360" r="18"/><text class="pin-text" x="860" y="360" dx=".02em" dy=".19em">2</text>
    <circle class="pin" cx="1685" cy="423" r="18"/><text class="pin-text" x="1685" y="423" dx=".02em" dy=".19em">3</text>
    <circle class="pin" cx="835" cy="755" r="18"/><text class="pin-text" x="835" y="755" dx=".02em" dy=".19em">4</text>
    <circle class="pin" cx="1166" cy="676" r="16.5"/><text class="pin-text" x="1166" y="676" dx=".02em" dy=".19em">5</text>
    <circle class="pin" cx="1506" cy="667" r="18"/><text class="pin-text" x="1506" y="667" dx=".02em" dy=".19em">6</text>
    <circle class="pin" cx="526" cy="965" r="16.5"/><text class="pin-text" x="526" y="965" dx=".02em" dy=".19em">7</text>
    <circle class="pin" cx="1162" cy="964" r="16.5"/><text class="pin-text" x="1162" y="964" dx=".02em" dy=".19em">8</text>
    <circle class="pin" cx="1302" cy="1110" r="15"/><text class="pin-text" x="1302" y="1110" dx=".02em" dy=".19em">9</text>
  </g>
</svg>
