<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 99 499 717" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port project tree pane with numbered markers</title>
  <desc id="desc">Project tree pane with markers for scan roots, project hierarchy, health columns, worktree groups, and disk rollups.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="160" cy="665" r="17"/><text class="pin-text" x="160" y="665" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="250" cy="665" r="17"/><text class="pin-text" x="250" y="665" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="340" cy="665" r="17"/><text class="pin-text" x="340" y="665" dx=".02em" dy=".19em">3</text>
  <circle class="pin" cx="430" cy="665" r="17"/><text class="pin-text" x="430" y="665" dx=".02em" dy=".19em">4</text>
  <circle class="pin" cx="520" cy="665" r="17"/><text class="pin-text" x="520" y="665" dx=".02em" dy=".19em">5</text>
</svg>
