<svg xmlns="http://www.w3.org/2000/svg" viewBox="1170 99 603 409" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port Git pane with numbered markers</title>
  <desc id="desc">Git pane with markers for branch summary, status, GitHub rate limits, remotes, worktrees, and sync state.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="1715" cy="160" r="17"/><text class="pin-text" x="1715" y="160" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="1715" cy="210" r="17"/><text class="pin-text" x="1715" y="210" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="1715" cy="260" r="17"/><text class="pin-text" x="1715" y="260" dx=".02em" dy=".19em">3</text>
  <circle class="pin" cx="1715" cy="315" r="17"/><text class="pin-text" x="1715" y="315" dx=".02em" dy=".19em">4</text>
  <circle class="pin" cx="1715" cy="372" r="17"/><text class="pin-text" x="1715" y="372" dx=".02em" dy=".19em">5</text>
  <circle class="pin" cx="1655" cy="315" r="17"/><text class="pin-text" x="1655" y="315" dx=".02em" dy=".19em">6</text>
</svg>
