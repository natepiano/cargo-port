<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1500" viewBox="0 0 1800 1500" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port callout treatment options</title>
  <desc id="desc">Six candidate callout visual treatments applied to the same cargo-port screenshot crop.</desc>
  <defs>
    <clipPath id="crop">
      <rect x="0" y="0" width="820" height="410" rx="0"/>
    </clipPath>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="glow-yellow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f5d90a" flood-opacity="0.85"/>
    </filter>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f5d90a"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#48d7d0"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f4f4f2"/>
    </marker>
    <style>
      .panel-title {
        font-family: Menlo, Consolas, monospace;
        font-size: 24px;
        font-weight: 700;
        fill: #f4f4f2;
      }
      .label {
        font-family: Menlo, Consolas, monospace;
        font-size: 24px;
        font-weight: 700;
      }
      .small-label {
        font-family: Menlo, Consolas, monospace;
        font-size: 20px;
        font-weight: 700;
      }
      .number {
        font-family: Menlo, Consolas, monospace;
        font-size: 30px;
        font-weight: 800;
      }
      .note {
        font-family: Menlo, Consolas, monospace;
        font-size: 17px;
        font-weight: 600;
        fill: #b7c4c4;
      }
    </style>
  </defs>
  <rect width="1800" height="1500" fill="#0a0f12"/>
  <text x="48" y="48" class="panel-title">Callout treatment options - pick the closest direction</text>
  <text x="48" y="76" class="note">Each panel uses the same screenshot crop; labels, arrows, and highlight styles are intentionally varied.</text>

  <g id="panel-a" transform="translate(48 110)">
    <text x="0" y="-16" class="panel-title">1. Existing dark label + yellow arrow</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#f5d90a" stroke-width="3"/>
    <circle cx="38" cy="38" r="26" fill="#f5d90a" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">1</text>
    <g filter="url(#soft-shadow)">
      <rect x="82" y="92" width="265" height="48" rx="7" fill="#101820" stroke="#f5d90a" stroke-width="2"/>
      <text x="100" y="124" class="label" fill="#f5d90a">Workspace summary</text>
      <path d="M214 140 L78 188" stroke="#f5d90a" stroke-width="3" marker-end="url(#arrow-yellow)"/>
      <rect x="494" y="238" width="210" height="48" rx="7" fill="#101820" stroke="#f5d90a" stroke-width="2"/>
      <text x="512" y="270" class="label" fill="#f5d90a">Worktrees</text>
      <path d="M494 260 L656 250" stroke="#f5d90a" stroke-width="3" marker-end="url(#arrow-yellow)"/>
    </g>
  </g>

  <g id="panel-b" transform="translate(930 110)">
    <text x="0" y="-16" class="panel-title">2. Numbered pins + legend</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#48d7d0" stroke-width="3"/>
    <circle cx="38" cy="38" r="26" fill="#48d7d0" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">2</text>
    <g filter="url(#soft-shadow)">
      <circle cx="80" cy="190" r="22" fill="#48d7d0" stroke="#071115" stroke-width="4"/>
      <text x="70" y="201" class="number" fill="#071115">1</text>
      <circle cx="654" cy="250" r="22" fill="#48d7d0" stroke="#071115" stroke-width="4"/>
      <text x="644" y="261" class="number" fill="#071115">2</text>
      <rect x="420" y="42" width="350" height="112" rx="8" fill="#071115" stroke="#48d7d0" stroke-width="2"/>
      <text x="440" y="78" class="small-label" fill="#48d7d0">1 Workspace summary</text>
      <text x="440" y="113" class="small-label" fill="#48d7d0">2 Linked worktrees</text>
    </g>
  </g>

  <g id="panel-c" transform="translate(48 585)">
    <text x="0" y="-16" class="panel-title">3. Spotlight rings + outside notes</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#f4f4f2" stroke-width="2"/>
    <circle cx="38" cy="38" r="26" fill="#f5d90a" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">3</text>
    <ellipse cx="91" cy="189" rx="78" ry="56" fill="none" stroke="#f5d90a" stroke-width="5" filter="url(#glow-yellow)"/>
    <ellipse cx="650" cy="250" rx="142" ry="58" fill="none" stroke="#f5d90a" stroke-width="5" filter="url(#glow-yellow)"/>
    <g filter="url(#soft-shadow)">
      <rect x="292" y="70" width="280" height="46" rx="23" fill="#f5d90a"/>
      <text x="316" y="101" class="label" fill="#071115">Scan rollup</text>
      <path d="M292 95 C240 108 168 142 118 174" stroke="#f5d90a" stroke-width="4" fill="none" marker-end="url(#arrow-yellow)"/>
      <rect x="280" y="315" width="260" height="46" rx="23" fill="#f5d90a"/>
      <text x="304" y="346" class="label" fill="#071115">Worktree table</text>
      <path d="M540 338 C604 325 647 301 661 275" stroke="#f5d90a" stroke-width="4" fill="none" marker-end="url(#arrow-yellow)"/>
    </g>
  </g>

  <g id="panel-d" transform="translate(930 585)">
    <text x="0" y="-16" class="panel-title">4. Minimal cyan brackets</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#24323a" stroke-width="2"/>
    <circle cx="38" cy="38" r="26" fill="#48d7d0" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">4</text>
    <g stroke="#48d7d0" stroke-width="5" fill="none">
      <path d="M23 126 H145 M23 126 V251 M23 251 H145"/>
      <path d="M495 192 H775 M775 192 V305 M495 305 H775"/>
    </g>
    <g filter="url(#soft-shadow)">
      <text x="160" y="160" class="label" fill="#48d7d0">workspace</text>
      <path d="M153 154 L118 168" stroke="#48d7d0" stroke-width="3" marker-end="url(#arrow-cyan)"/>
      <text x="392" y="238" class="label" fill="#48d7d0">worktrees</text>
      <path d="M520 244 L594 248" stroke="#48d7d0" stroke-width="3" marker-end="url(#arrow-cyan)"/>
    </g>
  </g>

  <g id="panel-e" transform="translate(48 1060)">
    <text x="0" y="-16" class="panel-title">5. White cards + thin leader lines</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#f4f4f2" stroke-width="2"/>
    <circle cx="38" cy="38" r="26" fill="#f4f4f2" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">5</text>
    <g filter="url(#soft-shadow)">
      <rect x="84" y="54" width="276" height="54" rx="8" fill="#f4f4f2"/>
      <text x="106" y="89" class="small-label" fill="#101820">Workspace summary</text>
      <path d="M222 108 L84 188" stroke="#f4f4f2" stroke-width="2" marker-end="url(#arrow-white)"/>
      <rect x="484" y="310" width="210" height="54" rx="8" fill="#f4f4f2"/>
      <text x="506" y="345" class="small-label" fill="#101820">Worktrees</text>
      <path d="M590 310 L645 272" stroke="#f4f4f2" stroke-width="2" marker-end="url(#arrow-white)"/>
    </g>
  </g>

  <g id="panel-f" transform="translate(930 1060)">
    <text x="0" y="-16" class="panel-title">6. Inline translucent highlights</text>
    <g clip-path="url(#crop)">
      <image href="dashboard-main.png" x="-550" y="-105" width="1840" height="1196"/>
    </g>
    <rect x="0" y="0" width="820" height="410" fill="none" stroke="#f5d90a" stroke-width="2"/>
    <circle cx="38" cy="38" r="26" fill="#f5d90a" stroke="#101820" stroke-width="4" filter="url(#soft-shadow)"/>
    <text x="28" y="49" class="number" fill="#101820">6</text>
    <rect x="22" y="128" width="210" height="132" rx="8" fill="#f5d90a" opacity="0.16" stroke="#f5d90a" stroke-width="3"/>
    <rect x="493" y="195" width="296" height="112" rx="8" fill="#f5d90a" opacity="0.16" stroke="#f5d90a" stroke-width="3"/>
    <g filter="url(#soft-shadow)">
      <text x="42" y="288" class="label" fill="#f5d90a">Workspace summary</text>
      <text x="514" y="336" class="label" fill="#f5d90a">Linked worktrees</text>
    </g>
  </g>
</svg>
