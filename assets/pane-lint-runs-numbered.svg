<svg xmlns="http://www.w3.org/2000/svg" viewBox="64 819 491 277" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port lint runs pane with numbered markers</title>
  <desc id="desc">Lint runs pane with markers for history count, run date grouping, duration, artifact size, result, and paging.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="512" cy="878" r="15"/><text class="pin-text" x="512" y="878" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="512" cy="928" r="15"/><text class="pin-text" x="512" y="928" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="512" cy="978" r="15"/><text class="pin-text" x="512" y="978" dx=".02em" dy=".19em">3</text>
  <circle class="pin" cx="512" cy="1028" r="15"/><text class="pin-text" x="512" y="1028" dx=".02em" dy=".19em">4</text>
  <circle class="pin" cx="452" cy="1076" r="15"/><text class="pin-text" x="452" y="1076" dx=".02em" dy=".19em">5</text>
  <circle class="pin" cx="304" cy="1076" r="15"/><text class="pin-text" x="304" y="1076" dx=".02em" dy=".19em">6</text>
</svg>
