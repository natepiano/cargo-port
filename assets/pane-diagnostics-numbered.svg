<svg xmlns="http://www.w3.org/2000/svg" viewBox="1107 505 127 311" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port diagnostics pane with numbered markers</title>
  <desc id="desc">Diagnostics pane with markers for per-core CPU usage, aggregate CPU rows, and GPU utilization.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="1202" cy="545" r="13.5"/><text class="pin-text" x="1202" y="545" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="1202" cy="730" r="13.5"/><text class="pin-text" x="1202" y="730" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="1202" cy="790" r="13.5"/><text class="pin-text" x="1202" y="790" dx=".02em" dy=".19em">3</text>
</svg>
