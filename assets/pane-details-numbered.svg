<svg xmlns="http://www.w3.org/2000/svg" viewBox="561 99 603 409" role="img" aria-labelledby="title desc">
  <title id="title">cargo-port details pane with numbered markers</title>
  <desc id="desc">Workspace details pane with markers for summary, primary workspace, disk breakdown, lint state, CI state, and structure counts.</desc>
  <defs>
    <filter id="pin-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .pin { fill: #48d7d0; stroke: #071115; stroke-width: 3; filter: url(#pin-shadow); }
      .pin-text { fill: #071115; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>
  <image href="dashboard-main.png" x="0" y="0" width="1840" height="1196"/>
  <circle class="pin" cx="862" cy="170" r="17"/><text class="pin-text" x="862" y="170" dx=".02em" dy=".19em">1</text>
  <circle class="pin" cx="862" cy="225" r="17"/><text class="pin-text" x="862" y="225" dx=".02em" dy=".19em">2</text>
  <circle class="pin" cx="862" cy="280" r="17"/><text class="pin-text" x="862" y="280" dx=".02em" dy=".19em">3</text>
  <circle class="pin" cx="930" cy="170" r="15"/><text class="pin-text" x="930" y="170" dx=".02em" dy=".19em">4</text>
  <circle class="pin" cx="930" cy="225" r="15"/><text class="pin-text" x="930" y="225" dx=".02em" dy=".19em">5</text>
  <circle class="pin" cx="1132" cy="188" r="17"/><text class="pin-text" x="1132" y="188" dx=".02em" dy=".19em">6</text>
</svg>
