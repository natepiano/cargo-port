# cargo-port keymap configuration
# Edit bindings below. Format: action = "Key" or "Modifier+Key"
# Modifiers: Ctrl, Alt, Shift.  Examples: "Ctrl+r", "Shift+Tab", "q"
# Note: when vim navigation is enabled, h/j/k/l are reserved
#       for navigation and cannot be used as action keys.

[global]
clean         = "c"
copy          = "y"
dismiss       = "x"
find          = "/"
next_pane     = "Tab"
open_editor   = "e"
open_keymap   = "Ctrl+k"
open_terminal = "t"
prev_pane     = "Shift+Tab"
quit          = "q"
rescan        = "Ctrl+r"
restart       = "R"
settings      = "s"

[navigation]
down  = "Down"
end   = "End"
home  = "Home"
left  = "Left"
right = "Right"
up    = "Up"

[project_list]
collapse_all = "-"
collapse_row = "Left"
expand_all   = "="
expand_row   = "Right"

[package]
activate = "Enter"

[git]
activate = "Enter"

[targets]
activate      = "Enter"
release_build = "r"

[lints]
activate      = "Enter"
clear_history = "d"

[ci_runs]
activate    = "Enter"
clear_cache = "d"
fetch_more  = "f"
show_all    = "a"
show_branch = "b"

[output]
cancel = "Esc"

[finder]
activate = "Enter"
cancel   = "Esc"

[overlay]
cancel     = "Esc"
start_edit = "Enter"
