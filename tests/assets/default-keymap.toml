# cargo-port keymap configuration
# Edit bindings below. Format: action = "Key" or "Modifier+Key"
# Modifiers: Ctrl, Alt, Shift.  Examples: "Ctrl+r", "Shift+Tab", "q"
# Note: = and + are treated as the same physical key.
# Note: when vim navigation is enabled, h/j/k/l are reserved
#       for navigation and cannot be used as action keys.

[global]
dismiss       = "x"
find          = "/"
next_pane     = "Tab"
open_editor   = "e"
open_keymap   = "Ctrl+k"
open_terminal = "t"
prev_pane     = "Shift+Tab"
quit          = "q"
rescan        = "Ctrl+r"
restart       = "R"
settings      = "s"

[project_list]
clean        = "c"
collapse_all = "-"
expand_all   = "+"

[package]
activate = "Enter"
clean    = "c"

[git]
activate = "Enter"
clean    = "c"

[targets]
activate      = "Enter"
clean         = "c"
release_build = "r"

[ci_runs]
activate    = "Enter"
clear_cache = "d"
toggle_view = "v"

[lints]
activate      = "Enter"
clear_history = "d"
