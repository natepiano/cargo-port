# cargo-port keymap configuration
# Edit bindings below. Format: action = "key" or "modifier-key"
# Modifiers: ctrl, alt, shift.  Examples: "ctrl-r", "shift-tab", "q"
# Chord steps are space-separated, e.g. "g g".
# Note: when vim navigation is enabled, vim navigation keys are reserved
#       for navigation and cannot be used as action keys.

[global]
clean         = "c"
copy          = "y"
dismiss       = "x"
find          = "/"
next_pane     = "tab"
open_editor   = "e"
open_keymap   = "ctrl-k"
open_terminal = "t"
prev_pane     = "shift-tab"
quit          = "q"
rescan        = "ctrl-r"
restart       = "R"
settings      = "s"

[navigation]
down           = "down"
end            = "end"
half_page_down = ""
half_page_up   = ""
home           = "home"
left           = "left"
page_down      = "pagedown"
page_up        = "pageup"
right          = "right"
up             = "up"

[project_list]
collapse_all = "-"
collapse_row = "left"
expand_all   = "="
expand_row   = "right"

[package]
activate = "enter"

[git]
activate = "enter"

[targets]
activate      = "enter"
release_build = "r"

[lints]
activate      = "enter"
clear_history = "d"

[ci_runs]
activate    = "enter"
clear_cache = "d"
fetch_more  = "f"
show_all    = "a"
show_branch = "b"

[output]
cancel = "escape"

[finder]
activate = "enter"
cancel   = "escape"

[overlay]
cancel     = "escape"
start_edit = "enter"
